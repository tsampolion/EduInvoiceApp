plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.devtools.ksp'
    id 'com.google.dagger.hilt.android'
    id 'org.jetbrains.kotlin.plugin.compose'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

android {
    namespace "gr.eduinvoice"
    compileSdk 35

    defaultConfig {
        applicationId "gr.eduinvoice"
        minSdk 26
        targetSdk 35
        versionCode 20
        versionName "0.22.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            def keystorePath = findProperty('RELEASE_STORE_FILE') ?: System.getenv('RELEASE_STORE_FILE')
            def releaseStorePassword = findProperty('RELEASE_STORE_PASSWORD') ?: System.getenv('RELEASE_STORE_PASSWORD')
            def releaseKeyAlias = findProperty('RELEASE_KEY_ALIAS') ?: System.getenv('RELEASE_KEY_ALIAS')
            def releaseKeyPassword = findProperty('RELEASE_KEY_PASSWORD') ?: System.getenv('RELEASE_KEY_PASSWORD')

            if (keystorePath) {
                storeFile file(keystorePath)
            }
            if (releaseStorePassword) {
                storePassword releaseStorePassword
            }
            if (releaseKeyAlias) {
                keyAlias releaseKeyAlias
            }
            if (releaseKeyPassword) {
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        // Explicitly generate BuildConfig to access BuildConfig.DEBUG
        buildConfig true
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "2.1.10"

    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
        }
    }
}

    dependencies {
        implementation project(':domain')
        implementation project(':data')
        // Core Android
        implementation 'androidx.core:core-ktx:1.16.0'
        implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.1'
        implementation 'androidx.activity:activity-compose:1.10.1'
        // Material Components (for XML themes)
        implementation 'com.google.android.material:material:1.12.0'
    // Jetpack Compose
    implementation platform("androidx.compose:compose-bom:2025.06.00")
    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.ui:ui-tooling-preview"
    implementation "androidx.compose.ui:ui-graphics"
    implementation "androidx.compose.material:material-icons-core"
    implementation "androidx.compose.material:material-icons-extended"
    implementation "androidx.compose.foundation:foundation"
    debugImplementation "androidx.compose.ui:ui-tooling"
    debugImplementation "androidx.compose.ui:ui-test-manifest"

    // Lifecycle
    implementation "androidx.lifecycle:lifecycle-runtime-compose:2.9.1"
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.9.1"

    // Navigation
    implementation "androidx.navigation:navigation-compose:2.9.0"
    implementation "androidx.hilt:hilt-navigation-compose:1.2.0"

    // Room
    implementation "androidx.room:room-runtime:2.7.1"
    implementation "androidx.room:room-ktx:2.7.1"
    ksp "androidx.room:room-compiler:2.7.1"

    // DataStore for app settings
    implementation "androidx.datastore:datastore-preferences:1.1.7"


    // Hilt - Updated to compatible version
    implementation "com.google.dagger:hilt-android:2.54"
    ksp "com.google.dagger:hilt-compiler:2.54"

    // Testing
    testImplementation "junit:junit:4.13.2"
    testImplementation "androidx.room:room-testing:2.7.1"
    testImplementation "androidx.test:core:1.5.0"
    testImplementation "org.robolectric:robolectric:4.11.1"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
    testImplementation "androidx.compose.ui:ui-test-junit4"
    androidTestImplementation "androidx.test.ext:junit:1.2.1"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.6.1"
    androidTestImplementation platform("androidx.compose:compose-bom:2025.06.00")
    androidTestImplementation "androidx.compose.ui:ui-test-junit4"

    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
    implementation platform('com.google.firebase:firebase-bom:33.15.0')
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-crashlytics:19.4.4'
}

// Room schema location for ksp
ksp {
    arg("room.schemaLocation", "$projectDir/schemas")
}

import groovy.json.JsonSlurper
import groovy.json.JsonOutput

def firebaseKey = findProperty('FIREBASE_API_KEY') ?: System.getenv('FIREBASE_API_KEY')
def googleServicesFile = file("$projectDir/google-services.json")

tasks.register('injectFirebaseKey') {
    doLast {
        if (firebaseKey) {
            def json = new JsonSlurper().parse(googleServicesFile)
            json.client[0].api_key[0].current_key = firebaseKey
            googleServicesFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(json))
        }
    }
}

tasks.whenTaskAdded { t ->
    if (t.name.startsWith('process') && t.name.endsWith('GoogleServices')) {
        t.dependsOn injectFirebaseKey
    }
}
