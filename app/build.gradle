// Room schema location for ksp
ksp {
    arg("room.schemaLocation", "$projectDir/schemas")
}

// Detekt configuration (only if plugin applied)
if (plugins.hasPlugin("io.gitlab.arturbosch.detekt")) {
    detekt {
        config.setFrom(files("$rootDir/config/detekt/detekt.yml"))
        buildUponDefaultConfig = true
        baseline = file("$rootDir/config/detekt/detekt-baseline.xml")
    }
}

// Spotless configuration
spotless {
    ratchetFrom 'origin/main'
    kotlin {
        target '**/*.kt'
        targetExclude '**/build/**'
        trimTrailingWhitespace()
        endWithNewline()
    }
    kotlinGradle {
        target '**/*.kts'
        targetExclude '**/build/**'
        trimTrailingWhitespace()
        endWithNewline()
    }
    format 'misc', {
        target '**/*.md', '**/.gitignore'
        targetExclude '**/build/**'
        trimTrailingWhitespace()
        endWithNewline()
    }
}

// Ensure JDK 17 reflective access for unit tests (Paparazzi/Compose)
tasks.withType(Test).configureEach {
    jvmArgs(
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/java.util=ALL-UNNAMED",
        "--add-opens=java.base/java.io=ALL-UNNAMED"
    )
    
    // Paparazzi configuration
    systemProperty 'paparazzi.snapshots.dir', file('src/test/snapshots').absolutePath
    systemProperty 'paparazzi.verify.mode', 'true'
    systemProperty 'paparazzi.record.mode', 'false'
}

