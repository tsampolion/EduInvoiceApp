import groovy.json.JsonSlurper

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.devtools.ksp'
    id 'com.google.dagger.hilt.android'
    id 'org.jetbrains.kotlin.plugin.compose'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id 'io.gitlab.arturbosch.detekt'
    id 'com.diffplug.spotless'
    id 'org.jetbrains.kotlinx.kover'
    id 'app.cash.paparazzi'
}

def firebaseKey = ""
def googleServicesFile = file("google-services.json")
if (googleServicesFile.exists()) {
    try {
        def json = new JsonSlurper().parse(googleServicesFile)
        firebaseKey = json.client?.getAt(0)?.api_key?.getAt(0)?.current_key
        if (!firebaseKey) {
            println "Warning: Firebase API key not found in google-services.json"
            firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
        }
    } catch (Exception e) {
        println "Warning: Failed to parse google-services.json: ${e.message}"
        firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
    }
} else {
    println "Warning: google-services.json not found, using mock key for development"
    firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
}

android {
    namespace "gr.eduinvoice"
    compileSdk 35

    defaultConfig {
        applicationId "gr.eduinvoice"
        minSdk 26
        targetSdk 35
        versionCode 40  // Increment version code
        versionName "0.27.0"  // Increment version name
        testInstrumentationRunner "com.google.dagger.hilt.android.testing.HiltTestRunner"
        buildConfigField "String", "FIREBASE_API_KEY", "\"${firebaseKey}\""
        
        // Add Firebase configuration
        manifestPlaceholders = [
            firebaseCrashlyticsEnabled: "true",
            firebaseAnalyticsEnabled: "false"
        ]
    }

    signingConfigs {
        release {
            def keystorePath = findProperty('RELEASE_STORE_FILE') ?: System.getenv('RELEASE_STORE_FILE')
            def releaseStorePassword = findProperty('RELEASE_STORE_PASSWORD') ?: System.getenv('RELEASE_STORE_PASSWORD')
            def releaseKeyAlias = findProperty('RELEASE_KEY_ALIAS') ?: System.getenv('RELEASE_KEY_ALIAS')
            def releaseKeyPassword = findProperty('RELEASE_KEY_PASSWORD') ?: System.getenv('RELEASE_KEY_PASSWORD')

            if (keystorePath) {
                storeFile file(keystorePath)
            }
            if (releaseStorePassword) {
                storePassword releaseStorePassword
            }
            if (releaseKeyAlias) {
                keyAlias releaseKeyAlias
            }
            if (releaseKeyPassword) {
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "boolean", "PLAY_INTEGRITY_ENABLED", "true"
        }
        debug {
            buildConfigField "boolean", "PLAY_INTEGRITY_ENABLED", "false"
        }
    }

    buildFeatures {
        // Explicitly generate BuildConfig to access BuildConfig.DEBUG
        buildConfig true
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "2.1.10"

    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }

    packagingOptions {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
        }
    }
}

// Align Guava for Paparazzi runtime to avoid IllegalAccessError from com.android.resources.ResourceType
configurations.configureEach { cfg ->
    if (cfg.name.toLowerCase().contains('testruntimeclasspath')) {
        cfg.resolutionStrategy.force 'com.google.guava:guava:33.3.1-jre'
    }
}

    dependencies {
        implementation project(':domain')
        implementation project(':data')
        // Core Android
        implementation 'androidx.core:core-ktx:1.16.0'
        implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.1'
        implementation 'androidx.activity:activity-compose:1.10.1'
        implementation 'androidx.appcompat:appcompat:1.6.1'
        implementation 'androidx.drawerlayout:drawerlayout:1.2.0'
        // Material Components (for XML themes)
        implementation 'com.google.android.material:material:1.12.0'
    // Jetpack Compose
    implementation platform("androidx.compose:compose-bom:2024.10.00")
    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.ui:ui-tooling-preview"
    implementation "androidx.compose.ui:ui-graphics"
    implementation "androidx.compose.material:material-icons-core"
    implementation "androidx.compose.material:material-icons-extended"
    implementation "androidx.compose.foundation:foundation"
    implementation "com.google.accompanist:accompanist-systemuicontroller:0.34.0"
    debugImplementation "androidx.compose.ui:ui-tooling"
    debugImplementation "androidx.compose.ui:ui-test-manifest"

    // Lifecycle
    implementation "androidx.lifecycle:lifecycle-runtime-compose:2.9.1"
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.9.1"

    // Navigation
    implementation "androidx.navigation:navigation-compose:2.9.0"
