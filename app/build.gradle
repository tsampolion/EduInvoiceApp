import groovy.json.JsonSlurper

plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.ksp)
    alias(libs.plugins.hilt)
    alias(libs.plugins.compose.compiler)
    alias(libs.plugins.google.services)
    alias(libs.plugins.firebase.crashlytics)
    alias(libs.plugins.spotless)
    alias(libs.plugins.kover)
    alias(libs.plugins.paparazzi)
}

def firebaseKey = ""
def googleServicesFile = file("google-services.json")
if (googleServicesFile.exists()) {
    try {
        def json = new JsonSlurper().parse(googleServicesFile)
        firebaseKey = json.client?.getAt(0)?.api_key?.getAt(0)?.current_key
        if (!firebaseKey) {
            println "Warning: Firebase API key not found in google-services.json"
            firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
        }
    } catch (Exception e) {
        println "Warning: Failed to parse google-services.json: ${e.message}"
        firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
    }
} else {
    println "Warning: google-services.json not found, using mock key for development"
    firebaseKey = "MOCK_KEY_FOR_DEVELOPMENT"
}

android {
    namespace "gr.eduinvoice"
    compileSdk 35

    defaultConfig {
        applicationId "gr.eduinvoice"
        minSdk 26
        targetSdk 35
        versionCode 45  // Increment version code
        versionName "0.28.4"  // Increment version name
        testInstrumentationRunner "com.google.dagger.hilt.android.testing.HiltTestRunner"
        buildConfigField "String", "FIREBASE_API_KEY", "\"${firebaseKey}\""
        
        // Add Firebase configuration
        manifestPlaceholders = [
            firebaseCrashlyticsEnabled: "true",
            firebaseAnalyticsEnabled: "false"
        ]

    }

    signingConfigs {
        release {
            def keystorePath = findProperty('RELEASE_STORE_FILE') ?: System.getenv('RELEASE_STORE_FILE')
            def releaseStorePassword = findProperty('RELEASE_STORE_PASSWORD') ?: System.getenv('RELEASE_STORE_PASSWORD')
            def releaseKeyAlias = findProperty('RELEASE_KEY_ALIAS') ?: System.getenv('RELEASE_KEY_ALIAS')
            def releaseKeyPassword = findProperty('RELEASE_KEY_PASSWORD') ?: System.getenv('RELEASE_KEY_PASSWORD')

            if (keystorePath) {
                storeFile file(keystorePath)
            }
            if (releaseStorePassword) {
                storePassword releaseStorePassword
            }
            if (releaseKeyAlias) {
                keyAlias releaseKeyAlias
            }
            if (releaseKeyPassword) {
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "boolean", "PLAY_INTEGRITY_ENABLED", "true"
        }
        debug {
            buildConfigField "boolean", "PLAY_INTEGRITY_ENABLED", "false"
        }
    }

    flavorDimensions "security"
    productFlavors {
        encrypted {
            dimension "security"
            buildConfigField "boolean", "DB_ENCRYPTION_ENABLED", "true"
        }
        plain {
            dimension "security"
            buildConfigField "boolean", "DB_ENCRYPTION_ENABLED", "false"
        }
    }

    buildFeatures {
        // Explicitly generate BuildConfig to access BuildConfig.DEBUG
        buildConfig true
        compose true
    }

    // Compose plugin manages the compiler; no explicit composeOptions needed

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }

    packagingOptions {
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
        }
        // Do not force-pick native libraries; rely on dependency resolution per-ABI
        // This avoids mismatched variants that can trigger CPU variant warnings
    }

    // Generate per-ABI APKs so emulators/devices get the exact native libs they need
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            universalApk false
        }
    }
}

