    // DataStore for app settings
    implementation "androidx.datastore:datastore-preferences:1.1.7"


    // Hilt - Updated to compatible version
    implementation "com.google.dagger:hilt-android:2.54"
    ksp "com.google.dagger:hilt-compiler:2.54"

    // Testing (unit tests)
    testImplementation "junit:junit:4.13.2"
    testImplementation "androidx.room:room-testing:2.7.1"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
    testImplementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"
    testImplementation "org.bouncycastle:bcprov-jdk15on:1.70"
    testImplementation "io.mockk:mockk:1.13.8"
    testImplementation "androidx.arch.core:core-testing:2.2.0"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0"
    testImplementation "com.lemonappdev:konsist:0.16.0"
    testImplementation "app.cash.turbine:turbine:1.1.0"
    
    // Test fixtures
    testImplementation(testFixtures(project(":domain")))
    testImplementation(testFixtures(project(":data")))
    // TODO: Move to module-local fixtures (Option A)
    // testImplementation(testFixtures(project(":test-support")))
    
    // Android Testing (instrumentation)
    androidTestImplementation "androidx.test.ext:junit:1.2.1"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.6.1"
    androidTestImplementation "androidx.test:runner:1.5.0"
    androidTestImplementation "androidx.test:rules:1.5.0"
    androidTestImplementation platform("androidx.compose:compose-bom:2024.10.00")
    androidTestImplementation "androidx.compose.ui:ui-test-junit4"
    androidTestImplementation "androidx.test.uiautomator:uiautomator:2.3.0"
    androidTestImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0"
    
    // Hilt Testing
    androidTestImplementation "com.google.dagger:hilt-android-testing:2.54"
    kspAndroidTest "com.google.dagger:hilt-compiler:2.54"
    
    // Test fixtures for Android tests
    androidTestImplementation(testFixtures(project(":domain")))
    androidTestImplementation(testFixtures(project(":data")))
    // TODO: Move to module-local fixtures (Option A)
    // androidTestImplementation(testFixtures(project(":test-support")))
    
    // Unit Test Dependencies

    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0"
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"
    implementation platform('com.google.firebase:firebase-bom:33.15.0')
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-crashlytics:19.4.4'
    implementation 'com.google.firebase:firebase-sessions'
    implementation 'com.google.firebase:firebase-analytics-ktx'
    // Firebase Performance Monitoring
    implementation 'com.google.firebase:firebase-perf-ktx'
    
    // Add SQLCipher for database encryption
    implementation 'net.zetetic:android-database-sqlcipher:4.5.4'

    // LeakCanary (debug only)
    debugImplementation 'com.squareup.leakcanary:leakcanary-android:2.14'

    // Paparazzi for snapshot tests
    testImplementation 'app.cash.paparazzi:paparazzi:1.3.3'
}

// Room schema location for ksp
ksp {
    arg("room.schemaLocation", "$projectDir/schemas")
}

// Detekt configuration
detekt {
    config.setFrom(files("$rootDir/config/detekt/detekt.yml"))
    buildUponDefaultConfig = true
    baseline = file("$rootDir/config/detekt/detekt-baseline.xml")
}

// Spotless configuration
spotless {
    ratchetFrom 'origin/main'
    kotlin {
        target '**/*.kt'
        trimTrailingWhitespace()
        endWithNewline()
    }
    kotlinGradle {
        target '**/*.kts'
        trimTrailingWhitespace()
        endWithNewline()
    }
    format 'misc', {
        target '**/*.md', '**/.gitignore'
        trimTrailingWhitespace()
        endWithNewline()
    }
}

// Ensure JDK 17 reflective access for unit tests (Paparazzi/Compose)
tasks.withType(Test).configureEach {
    jvmArgs(
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/java.util=ALL-UNNAMED",
        "--add-opens=java.base/java.io=ALL-UNNAMED"
    )
    
    // Paparazzi configuration
    systemProperty 'paparazzi.snapshots.dir', file('src/test/snapshots').absolutePath
    systemProperty 'paparazzi.verify.mode', 'true'
    systemProperty 'paparazzi.record.mode', 'false'
}

