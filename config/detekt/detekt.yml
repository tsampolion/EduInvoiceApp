style:
  ForbiddenImport:
    active: true
    imports:
      - 'gr.eduinvoice.data.model.*'
      - 'gr.eduinvoice.data.database.*'
      - 'gr.eduinvoice.data.adapter.*'
      - 'gr.eduinvoice.data.concurrency.*'
      - 'gr.eduinvoice.data.repository.*'
      - 'gr.eduinvoice.data.dao.*'
      - 'gr.eduinvoice.data.mapper.*'
    excludes: ['**/app/src/test/**']

# Custom rules for preventing manual migrations
custom-rules:
  active: true
  NoManualMigrations:
    active: true
    includes: ['**/database/**/*.kt']
    excludes: ['**/AutoMigrations.kt']
    pattern: 'class.*Migration.*:.*Migration'
    message: 'Manual migrations are banned. Use AutoMigrationSpec instead.'
    severity: ERROR
