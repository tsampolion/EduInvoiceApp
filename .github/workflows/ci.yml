name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android SDK cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          packages: |-
            platforms;android-35
            build-tools;35.0.0
            platform-tools

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "android.useAndroidX=true" >> local.properties
          echo "android.enableJetifier=false" >> local.properties

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and Unit Tests
        run: ./gradlew clean test --no-daemon --stacktrace --warning-mode all

      - name: Generate Room schemas (KSP)
        run: ./gradlew :data:kspDebugKotlin --no-daemon --stacktrace --warning-mode all

      - name: Upload Room schemas
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: room-schemas
          path: |
            data/schemas/
          retention-days: 30

      - name: Coverage verify (Kover)
        run: ./gradlew koverVerify --no-daemon --stacktrace --warning-mode all

      - name: Detekt
        run: ./gradlew detekt --no-daemon --stacktrace --warning-mode all

      - name: Assemble release (sanity check)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: |
            app/build/outputs/
          retention-days: 7

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: build-test-quality
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android SDK cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          packages: |-
            platforms;android-35
            build-tools;35.0.0
            platform-tools

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "android.useAndroidX=true" >> local.properties
          echo "android.enableJetifier=false" >> local.properties

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedAndroidTest --stacktrace --info

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            app/build/reports/
            test-reports/
          retention-days: 30
