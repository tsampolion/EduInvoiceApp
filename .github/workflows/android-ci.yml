# .github/workflows/android-ci.yml

name: Android CI with Caching

# Trigger this workflow on every push or pull request
on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cache the Android SDK and apt packages
      # This is the core of the speed optimization.
      - name: Cache Android SDK and apt packages
        uses: actions/cache@v4
        with:
          # List of directories to cache
          path: |
            /home/runner/android-sdk
            /var/cache/apt/archives
            /var/lib/apt/lists
          # The cache key. If the setup script changes, the hash changes,
          # and a new cache is created.
          key: ${{ runner.os }}-android-sdk-cache-${{ hashFiles('**/setup-android-sdk.sh') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-cache-

      # 3. Make the setup script executable
      - name: Set execute permission for script
        run: chmod +x setup-android-sdk.sh

      # 4. Run the setup script
      # It will run quickly if the cache was restored.
      - name: Run Android SDK Setup
        run: sudo ./setup-android-sdk.sh

      # 5. Run your build
      # IMPORTANT: Replace './gradlew build' with your actual build and test commands.
      - name: Build with Gradle
        run: ./gradlew build
